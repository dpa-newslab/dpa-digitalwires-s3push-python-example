service: ${self:custom.global_resource_prefix}-${self:custom.component_name}

useDotenv: true

plugins:
  - serverless-python-requirements

custom:
  component_name: dpa-s3push-receive-python  # CHANGE THIS!
  global_resource_prefix: ${env:GLOBAL_RESOURCE_PREFIX}  # CHANGE THIS!

  description: "Setup S3 bucket to receive dpa content"

  ####
  #### Please set bucket name and prefix (IMPORTANT: lowercase only, no leading and trailing slashes)
  ####
  s3_bucket_name: ${env:S3_BUCKET_NAME, '${self:custom.global_resource_prefix}-dpa-s3push-incoming-mycompany-com'}
  s3_prefix_in: ${env:S3_PREFIX_IN, 's3push-receive'}
  s3_prefix_out: ${env:S3_PREFIX_OUT, 'received'}

  ####
  #### Lambda configuration
  ####
  download_assets: ${env:DOWNLOAD_ASSETS, 'true'}
  convert_to_iptc: ${env:CONVERT_TO_IPTC, 'false'}
  convert_to_newsmlg2: ${env:CONVERT_TO_NEWSMLG2, 'false'}

  sns_s3push_incoming_topic_name: ${self:custom.global_resource_prefix}-dpa-s3push-incoming-sns

  sqs_incoming_name: ${self:custom.global_resource_prefix}-s3push-incoming-sqs  # CHANGE THIS!

  pythonRequirements:
    useStaticCache: false


provider:
  name: aws
  runtime: python3.14
  stage: ${opt:stage, 'dev'}  # CHANGE THIS!
  region: ${env:AWS_REGION}
  deploymentBucket: ${env:DEPLOYMENT_BUCKET}
  logRetentionInDays: 14
  iamRoleStatements:
    - Effect: "Allow"
      Action:
        - "s3:GetObject"
      Resource:
        - Fn::Join:
            - ""
            - - "arn:aws:s3:::"
              - ${self:custom.s3_bucket_name}
              - "/"
              - ${self:custom.s3_prefix_in}
              - "/*"
    - Effect: "Allow"
      Action:
        - "s3:PutObject"
        - "s3:GetObject"
      Resource:
        - Fn::Join:
            - ""
            - - "arn:aws:s3:::"
              - ${self:custom.s3_bucket_name}
              - "/"
              - ${self:custom.s3_prefix_out}
              - "/*"

functions:
  receive_digitalwires:
    handler: handler.receive_digitalwires
    memorySize: 512
    events:
      - sqs:
          arn: { "Fn::GetAtt": [ "S3PushIncomingQueue", "Arn" ] }
          batchSize: 1
    environment:
      S3_BUCKET_NAME: ${self:custom.s3_bucket_name}
      S3_BUCKET_PREFIX_OUT: ${self:custom.s3_prefix_out}
      S3_BUCKET_PREFIX_TO_REMOVE: ${self:custom.s3_prefix_in}
      DOWNLOAD_ASSETS: ${self:custom.download_assets}
      CONVERT_TO_IPTC: ${self:custom.convert_to_iptc}
      CONVERT_TO_NEWSMLG2: ${self:custom.convert_to_newsmlg2}

resources:
  Description: "${self:custom.description}"
  Resources:
    # Users
    S3PushAccessKey:
      Type: AWS::IAM::AccessKey
      Properties:
        UserName: { "Ref": "S3PushUser" }
    S3PushUser:
      Type: AWS::IAM::User
      Properties:
        Path: "/"
        Policies:
          - PolicyName: S3PushUserAccessPolicy
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: "Allow"
                  Action:
                    - "s3:GetObject"
                    - "s3:PutObject"
                  Resource: "arn:aws:s3:::${self:custom.s3_bucket_name}/${self:custom.s3_prefix_in}/*"
                - Effect: "Allow"
                  Action:
                    - "s3:GetBucketLocation"
                  Resource: "arn:aws:s3:::${self:custom.s3_bucket_name}"
                - Effect: "Allow"
                  Action: "s3:ListBucket"
                  Condition:
                    StringLike:
                      "s3:prefix": "${self:custom.s3_prefix_in}/*"
                  Resource: "arn:aws:s3:::${self:custom.s3_bucket_name}"

    # bucket
    S3PushBucket:
      Type: AWS::S3::Bucket
      DependsOn:
        - S3PushIncomingTopic
        - S3PushIncomingTopicPolicy
      Properties:
        BucketName: ${self:custom.s3_bucket_name}
        AccessControl: Private
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          IgnorePublicAcls: true
          BlockPublicPolicy: true
          RestrictPublicBuckets: true
        VersioningConfiguration:
          Status: Enabled
        LifecycleConfiguration:
          Rules:
            - Id: delete-incoming-after-30-days
              ExpirationInDays: 30
              Prefix: ${self:custom.s3_prefix_in}/
              Status: Enabled
        CorsConfiguration:
          CorsRules:
            - AllowedOrigins:
                - '*'
              AllowedHeaders:
                - '*'
              AllowedMethods:
                - GET
                - HEAD
              MaxAge: 3000
        NotificationConfiguration:
          TopicConfigurations:
            - Event: s3:ObjectCreated:*
              Filter:
                S3Key:
                  Rules:
                    - Name: Prefix
                      Value: "${self:custom.s3_prefix_in}"
                    - Name: Suffix
                      Value: .json
              Topic:
                Ref: S3PushIncomingTopic

    # topic for incoming dpa content (.json)
    S3PushIncomingTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: ${self:custom.sns_s3push_incoming_topic_name}

    S3PushIncomingTopicPolicy:
      Type: AWS::SNS::TopicPolicy
      Properties:
        Topics:
          - Ref: S3PushIncomingTopic
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Sid: AllowS3PushBucketToPublishToQueue
              Effect: Allow
              Principal:
                Service: s3.amazonaws.com
              Action: sns:Publish
              Resource:
                Ref: S3PushIncomingTopic
              Condition:
                ArnLike:
                  "aws:SourceArn": "arn:aws:s3:*:*:${self:custom.s3_bucket_name}"

    # read this queue to get a stream of incoming articles 
    S3PushIncomingQueue:
      Type: AWS::SQS::Queue
      Properties:
        DelaySeconds: 0
        MaximumMessageSize: 262144
        MessageRetentionPeriod: 864000
        QueueName: ${self:custom.sqs_incoming_name}
        ReceiveMessageWaitTimeSeconds: 0
        VisibilityTimeout: 90
        #RedrivePolicy:
        #  deadLetterTargetArn: !GetAtt FailureQueue.Arn
        #  maxReceiveCount: 10

    SnsToSqsIncomingSubscription:
      Type: AWS::SNS::Subscription
      Properties:
        TopicArn: { "Fn::Join": [ "", [ "arn:aws:sns:", { "Ref": "AWS::Region" }, ":", { "Ref": "AWS::AccountId" }, ":${self:custom.sns_s3push_incoming_topic_name}" ] ] }
        Endpoint:
          Fn::GetAtt: [ S3PushIncomingQueue, Arn ]
        Protocol: sqs
        RawMessageDelivery: true

    # Policy allows SNS to publish to this SQS queue
    IncomingSnsToSqsPolicy:
      Type: AWS::SQS::QueuePolicy
      Properties:
        PolicyDocument:
          Version: "2012-10-17"
          Statement:
            - Sid: "Allow SNS publish to SQS"
              Effect: Allow
              Principal:
                Service: "sns.amazonaws.com"
              Resource: { "Fn::Join": [ "", [ "arn:aws:sqs:", { "Ref": "AWS::Region" }, ":", { "Ref": "AWS::AccountId" }, ":${self:custom.sqs_incoming_name}" ] ] }
              Action: SQS:SendMessage
              Condition:
                ArnEquals:
                  aws:SourceArn: { "Fn::Join": [ "", [ "arn:aws:sns:", { "Ref": "AWS::Region" }, ":", { "Ref": "AWS::AccountId" }, ":${self:custom.sns_s3push_incoming_topic_name}" ] ] }
        Queues:
          - Ref: S3PushIncomingQueue

  Outputs:
    S3PushUrlPrefix:
      Value: { "Fn::Join": [ "", [ "s3://", { "Ref": "S3PushBucket" }, "/${self:custom.s3_prefix_in}" ] ] }
    S3PushAccessKeyId:
      Value: { "Ref": "S3PushAccessKey" }
    S3PushSecretAccessKey:
      Value: { "Fn::GetAtt": [ "S3PushAccessKey", "SecretAccessKey" ] }
    S3PushDeliveryQueueUrl:
      Value: { "Ref": "S3PushIncomingQueue" }

package:
  exclude:
    - "*"
    - "**/*"
  include:
    - "handler.py"
    - "requirements.txt"
    - "!**/*.pyc"
    - "!**/*~"

